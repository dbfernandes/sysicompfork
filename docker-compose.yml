services:
  db:
    container_name: db_sysicomp
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - db_sysicomp:/var/lib/mysql
    networks:
      - sysicomp-network

  sysicomp:
    container_name: sysicomp
    mem_limit: 512m
    build:
      context: .
    command: 'node build/server.js'
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    volumes:
      - /app/node_modules
      - ./logs:/app/logs
      - ./uploads:/app/uploads

    depends_on:
      - db
      - gotenberg
    env_file:
      - .env
    networks:
      - sysicomp-network

  selecao_ppgi:
    container_name: selecao_ppgi
    mem_limit: 1024m
    build:
      context: .
    command: 'node build/serverSelecao.js'
    restart: unless-stopped
    ports:
      - '${PORT_SELECAO:-4000}:${PORT_SELECAO:-4000}'
    volumes:
      - /app/node_modules
      - ./logs:/app/logs
      - ./uploads:/app/uploads

    depends_on:
      - db
      - gotenberg
    env_file:
      - .env
    networks:
      - sysicomp-network

  gotenberg:
    container_name: gotenberg
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    mem_limit: 256m
    ports:
      - '${PORT_GOTENBERG:-3002}:3000'
    networks:
      - sysicomp-network


networks:
  sysicomp-network:
    driver: bridge

volumes:
  db_sysicomp:
  portainer_data: