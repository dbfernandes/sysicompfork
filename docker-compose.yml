version: '3'
services:
  db:
    image: mysql:5.7
    restart: always
    volumes:
      - ./dump:/docker-entrypoint-initdb.d
    environment:
      MYSQL_DATABASE: 'db'
   
      MYSQL_USER: 'user'
     
      MYSQL_PASSWORD: 'password'
  
      MYSQL_ROOT_PASSWORD: 'password'

    ports:
      - '3327:3306'
    expose:
      - '3327'
      # Where our data will be persisted

#Docker Networks
networks:
  sysicomp-network:
    driver: bridge