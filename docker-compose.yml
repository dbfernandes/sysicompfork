version: '3.8'

services:
  db:
    container_name: db_sysicomp
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - db_sysicomp:/var/lib/mysql
    networks:
      - sysicomp-network

  phpmyadmin:
    container_name: phpmyadmin_sysicomp
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - '8080:80'
    depends_on:
      - db
    networks:
      - sysicomp-network

  sysicomp:
    container_name: sysicomp
    build:
      context: .
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    working_dir: /app
    volumes:
      - .:/app:delegated
      - /app/node_modules
    depends_on:
      - db
      - gotenberg
    env_file:
      - .env
    networks:
      - sysicomp-network

  selecao_ppgi:
    container_name: selecao_ppgi
    build:
      context: .
      dockerfile: Dockerfile.selecao
    restart: unless-stopped
    ports:
      - '${PORT_SELECAO:-4000}:${PORT_SELECAO:-4000}'
    working_dir: /app
    volumes:
      - .:/app:delegated
      - /app/node_modules
    depends_on:
      - db
      - gotenberg
    env_file:
      - .env
    networks:
      - sysicomp-network

  gotenberg:
    container_name: gotenberg
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    ports:
      - '${PORT_GOTENBERG:-3002}:3000'  # Expondo porta padrão 3000 do Gotenberg para localhost na 3001
    networks:
      - sysicomp-network


# Redes isoladas para os serviços
networks:
  sysicomp-network:
    driver: bridge

# Persistência do banco de dados
volumes:
  db_sysicomp:
