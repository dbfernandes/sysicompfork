version: '3.8'
services:
  db:
    image: mysql:8
    volumes:
      - ./dump:/docker-entrypoint-initdb.d
    environment:
      MYSQL_DATABASE: 'db'
   
      MYSQL_USER: 'user'
     
      MYSQL_PASSWORD: 'password'
  
      MYSQL_ROOT_PASSWORD: 'password'

    ports:
      - 3327:3306
    expose:
      - '3327'
      # Where our data will be persisted
  sysicomp:
    build: .
    env_file:
      - src/.env
    ports: 
      - 3003:3000
    working_dir: /app
    volumes: 
      - .:/app
      - /app/node_modules
    depends_on: 
      - db

#Docker Networks
networks:
  sysicomp-network:
    driver: bridge
