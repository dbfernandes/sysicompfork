version: '3'
services:
  db:
    image: mysql:5.7
    restart: always
    volumes:
      - ./dump:/docker-entrypoint-initdb.d
    environment:
      MYSQL_DATABASE: 'db'
   
      MYSQL_USER: 'user'
     
      MYSQL_PASSWORD: 'password'
  
      MYSQL_ROOT_PASSWORD: 'password'

    ports:
      - '3327:3306'
    expose:
      - '3327'

  sysicomp:
    build:
      context: ./
    ports: 
      - 3000:3000
    working_dir: /app
    volumes: 
      - ./:/app
    networks: 
      - sysicomp-network
      
    links:
      - db
    depends_on: 
      - db

#Docker Networks
networks:
  sysicomp-network:
    driver: bridge