services:
  db:
    container_name: db_sysicomp
    image: mysql:8
    environment:
      MYSQL_DATABASE: 'db'
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'password'
      MYSQL_ROOT_PASSWORD: 'password'
      MYSQL_PORT: '3327'
    ports:
      - '${MYSQL_PORT}:3306'
    volumes:
      - db_sysicomp:/var/lib/mysql
    networks:
      - sysicomp-network

  sysicomp:
    container_name: sysicomp
    build: .
    ports:
      - '${PORT}:3000'
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules #Docker vai separar o node_modules do container do host, resolução de problema da biblioteca bycript
    depends_on:
      - db
    networks:
      - sysicomp-network
    env_file:
      - .env

#Docker Networks
networks:
  sysicomp-network:
    driver: bridge

volumes:
  db_sysicomp:
