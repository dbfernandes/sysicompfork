services:
  db:
    container_name: db_sysicomp
    image: mysql:8
    environment:
      MYSQL_DATABASE: 'db'
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'password'
      MYSQL_ROOT_PASSWORD: 'password'
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_sysicomp:/var/lib/mysql
    networks:
      - sysicomp-network
      
  sysicomp:
    container_name: sysicomp
    build: .
    env_file:
      - .env
    ports: 
      - "${PORT}:3000"
    working_dir: /app
    volumes: 
      - .:/app
      - /app/node_modules
    depends_on: 
      - db
    networks:
      - sysicomp-network

#Docker Networks
networks:
  sysicomp-network:
    driver: bridge

volumes:
  db_sysicomp: